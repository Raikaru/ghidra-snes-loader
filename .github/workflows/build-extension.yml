name: Build Ghidra extension

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:
    inputs:
      ghidra_version:
        description: 'Ghidra release to build against (e.g. 12.0.4)'
        required: false
        default: '12.0.4'
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # We build against the same Ghidra release on Linux and Windows so
        # the OS-specific build paths (sleigh launcher choice, line endings,
        # extension zip layout) get exercised. Linux is the canonical
        # producer of the published release zip.
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      # Loader source uses ImporterSettings + 5-arg getDefaultOptions, both
      # added in Ghidra 11.4. 12.0.4 is the latest stable line as of the
      # 1.2.0 release; bump together with the source if the API drifts again.
      GHIDRA_VERSION: ${{ github.event.inputs.ghidra_version || '12.0.4' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve Ghidra release URL
        id: resolve
        run: |
          set -euo pipefail
          RELEASE_JSON="$(curl -fsSL https://api.github.com/repos/NationalSecurityAgency/ghidra/releases)"
          URL="$(printf '%s' "$RELEASE_JSON" \
            | jq -r --arg v "$GHIDRA_VERSION" \
                '[.[] | .assets[] | select(.name | test("ghidra_" + $v + "_PUBLIC_[0-9]+\\.zip$"))][0].browser_download_url')"
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "Could not resolve Ghidra release ${GHIDRA_VERSION} from GitHub releases" >&2
            exit 1
          fi
          echo "ghidra_url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${URL}"

      - name: Cache Ghidra distribution
        id: cache-ghidra
        uses: actions/cache@v4
        with:
          path: ghidra
          key: ghidra-${{ matrix.os }}-${{ env.GHIDRA_VERSION }}

      - name: Download and unpack Ghidra
        if: steps.cache-ghidra.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ghidra
          curl -fL --retry 3 -o ghidra.zip "${{ steps.resolve.outputs.ghidra_url }}"
          unzip -q ghidra.zip -d ghidra
          rm ghidra.zip
          inner="$(find ghidra -maxdepth 1 -mindepth 1 -type d -name 'ghidra_*' | head -n1)"
          shopt -s dotglob
          mv "$inner"/* ghidra/
          rmdir "$inner"

      - name: Install ghidra-65816 processor module
        shell: bash {0}
        run: |
          set -uo pipefail
          # The loader is useless without the 65816 language. Pull the
          # companion repo, drop it into Ghidra's processor tree, and
          # compile its SLEIGH spec exactly once.
          git clone --depth=1 https://github.com/Raikaru/ghidra-65816.git ghidra-65816 || exit 1
          dest="ghidra/Ghidra/Processors/65816"
          mkdir -p "$dest"
          cp ghidra-65816/Module.manifest "$dest/" || exit 1
          cp -r ghidra-65816/data "$dest/" || exit 1
          # Pick the right launcher per OS. The Windows distribution ships
          # sleigh.bat and analyzeHeadless.bat; on Linux they're plain
          # shell scripts we have to mark executable.
          if [ "$RUNNER_OS" = "Windows" ]; then
            sleigh="ghidra/support/sleigh.bat"
          else
            chmod +x ghidra/support/sleigh
            sleigh="ghidra/support/sleigh"
          fi
          # The Ghidra launcher can exit non-zero on cleanup even when the
          # SLEIGH compile itself succeeded; judge success by the .sla
          # output, not by exit code.
          "$sleigh" -a "$dest" > sleigh.log 2>&1
          rc=$?
          echo "sleigh exit code: $rc"
          tail -n 50 sleigh.log
          for f in 65816.sla 65802.sla; do
            if [ ! -f "$dest/data/languages/$f" ]; then
              echo "Missing $dest/data/languages/$f" >&2
              exit 1
            fi
          done

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Build extension zip
        working-directory: SnesLoader
        env:
          GHIDRA_INSTALL_DIR: ${{ github.workspace }}/ghidra
        run: |
          set -euo pipefail
          # The wrapper bundled in the repo is Gradle 5.6.3, which can't
          # run on JDK 21. Drive the build with the action-supplied
          # Gradle 8.5 instead. Ghidra 11.x's bundled build.gradle
          # supports Gradle 7.3+, so 8.5 is fine.
          gradle --no-daemon buildExtension

      - name: Locate extension zip
        id: locate
        shell: bash {0}
        run: |
          set -uo pipefail
          # Search broadly: Ghidra has shifted the buildExtension output
          # location across versions (SnesLoader/dist/,
          # SnesLoader/build/distributions/, etc.).
          echo "--- All zips outside the Ghidra checkout ---"
          find . -type f -name '*.zip' -not -path './ghidra/*' 2>/dev/null
          mapfile -t hits < <(find . -type f -name '*.zip' -not -path './ghidra/*' \
            \( -name '*snes_loader*' -o -name '*SnesLoader*' \) 2>/dev/null)
          echo "Candidates:"
          printf '  %s\n' "${hits[@]:-(none)}"
          if [ "${#hits[@]}" -eq 0 ]; then
            echo "No extension zip produced." >&2
            echo "--- SnesLoader tree ---"
            find SnesLoader -maxdepth 4 -type f 2>/dev/null | head -n 200
            exit 1
          fi
          echo "zip=${hits[0]}" >> "$GITHUB_OUTPUT"
          echo "Using ${hits[0]}"

      - name: Install built extension into Ghidra
        shell: bash {0}
        run: |
          set -uo pipefail
          ZIP="${{ steps.locate.outputs.zip }}"
          dest="ghidra/Ghidra/Extensions"
          mkdir -p "$dest"
          unzip -oq "$ZIP" -d "$dest"
          echo "--- Installed extension layout ---"
          find "$dest" -maxdepth 2 -type f | head -n 20
          # The directory name inside the zip varies by Ghidra version
          # (`ghidra_snes_loader` historically, `SnesLoader` from 12.x).
          mapfile -t props < <(find "$dest" -maxdepth 2 -name extension.properties)
          if [ "${#props[@]}" -eq 0 ]; then
            echo "extension.properties not found after unpack" >&2
            exit 1
          fi
          echo "Installed: ${props[0]}"

      # ---------------------------------------------------------------
      # Smoke tests. We run analyzeHeadless three times against three
      # synthesized ROMs, each with its own list of required MARK lines:
      #
      #   * min-LoROM   -- baseline mapping + vector + mirror coverage
      #   * idiom-LoROM -- DBR/DP analyser correctness on PHK/PLB and TCD
      #   * min-HiROM   -- HiROM mapping (bank $C0 primary + $00 mirror)
      #
      # The runner script encapsulates the headless invocation and
      # prints a uniform header so the log is greppable per-ROM.
      # ---------------------------------------------------------------

      - name: Smoke-test min-LoROM
        if: matrix.os == 'ubuntu-latest'
        shell: bash {0}
        env:
          GHIDRA_INSTALL_DIR: ${{ github.workspace }}/ghidra
        run: |
          set -uo pipefail
          mkdir -p smoke/min-lorom/proj smoke/min-lorom/scripts smoke/min-lorom/rom
          python3 tests/synth-min-lorom.py smoke/min-lorom/rom/min.smc
          cp tests/PrintSnesArtifacts.java smoke/min-lorom/scripts/
          echo "===== min-LoROM ====="
          ghidra/support/analyzeHeadless smoke/min-lorom/proj smoketest \
            -import smoke/min-lorom/rom/min.smc \
            -scriptPath smoke/min-lorom/scripts \
            -postScript PrintSnesArtifacts.java \
            -deleteProject \
            > smoke/min-lorom/headless.log 2>&1
          rc=$?
          echo "analyzeHeadless exit code: $rc"
          tail -n 80 smoke/min-lorom/headless.log
          grep -E 'MARK:' smoke/min-lorom/headless.log > smoke/min-lorom/marks.txt || true
          cat smoke/min-lorom/marks.txt
          if [ "$rc" -ne 0 ] && [ ! -s smoke/min-lorom/marks.txt ]; then
            echo "min-LoROM analyzeHeadless failed and produced no MARK output" >&2
            exit 1
          fi

      - name: Assert min-LoROM markers
        if: matrix.os == 'ubuntu-latest'
        shell: bash {0}
        run: |
          set -uo pipefail
          marks=smoke/min-lorom/marks.txt
          required=(
            'MARK: LANGUAGE 65816:LE:16:default'
            'MARK: MAPMODE @ 0000ffd5 = 20'
            'MARK: VECTOR vector_RESET @ 0000fffc'
            'MARK: VECTOR vector_NMI_native @ 0000ffea'
            'MARK: VECTOR vector_BRK_native @ 0000ffe6'
            'MARK: BLOCK lowram_mirror_01'
            'MARK: BLOCK hwregs_mirror_01'
            'MARK: BLOCK lowram_mirror_3F'
            'MARK: BLOCK hwregs_mirror_3F'
            'MARK: LABEL NMITIMEN @ 00004200'
            'MARK: LABEL NMITIMEN @ 00014200'
            'MARK: LABEL NMITIMEN @ 003f4200'
            'MARK: ENTRY RESET 00008000'
            # Emulation-mode vectors land at E=M=X=1.
            'MARK: CTX ctx_EF @ 00008000 = 1'
            'MARK: CTX ctx_MF @ 00008000 = 1'
            'MARK: CTX ctx_XF @ 00008000 = 1'
          )
          fail=0
          for pat in "${required[@]}"; do
            if grep -qF "$pat" "$marks"; then
              echo "OK   $pat"
            else
              echo "MISS $pat"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || { echo "min-LoROM smoke test failed" >&2; exit 1; }

      - name: Smoke-test idiom-LoROM
        if: matrix.os == 'ubuntu-latest'
        shell: bash {0}
        env:
          GHIDRA_INSTALL_DIR: ${{ github.workspace }}/ghidra
        run: |
          set -uo pipefail
          mkdir -p smoke/idiom-lorom/proj smoke/idiom-lorom/scripts smoke/idiom-lorom/rom
          python3 tests/synth-idiom-lorom.py smoke/idiom-lorom/rom/idiom.smc
          cp tests/PrintSnesArtifacts.java smoke/idiom-lorom/scripts/
          echo "===== idiom-LoROM ====="
          ghidra/support/analyzeHeadless smoke/idiom-lorom/proj smoketest \
            -import smoke/idiom-lorom/rom/idiom.smc \
            -scriptPath smoke/idiom-lorom/scripts \
            -postScript PrintSnesArtifacts.java \
            -deleteProject \
            > smoke/idiom-lorom/headless.log 2>&1
          rc=$?
          echo "analyzeHeadless exit code: $rc"
          tail -n 80 smoke/idiom-lorom/headless.log
          grep -E 'MARK:' smoke/idiom-lorom/headless.log > smoke/idiom-lorom/marks.txt || true
          cat smoke/idiom-lorom/marks.txt
          if [ "$rc" -ne 0 ] && [ ! -s smoke/idiom-lorom/marks.txt ]; then
            echo "idiom-LoROM analyzeHeadless failed and produced no MARK output" >&2
            exit 1
          fi

      - name: Assert idiom-LoROM markers (DBR/DP analyser)
        if: matrix.os == 'ubuntu-latest'
        shell: bash {0}
        run: |
          set -uo pipefail
          marks=smoke/idiom-lorom/marks.txt
          # The whole point of this ROM: prove the analyser saw the
          # PHK/PLB and TCD idioms and propagated the resulting bank /
          # direct-page values to the test points.
          required=(
            'MARK: LANGUAGE 65816:LE:16:default'
            'MARK: VECTOR vector_RESET @ 0000fffc'
            'MARK: ENTRY RESET 00008000'
            'MARK: CTX DBR @ 00008009 = 80'
            'MARK: CTX DP @ 00008012 = 1234'
          )
          fail=0
          for pat in "${required[@]}"; do
            if grep -qF "$pat" "$marks"; then
              echo "OK   $pat"
            else
              echo "MISS $pat"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || { echo "idiom-LoROM smoke test failed" >&2; exit 1; }

      - name: Smoke-test min-HiROM
        if: matrix.os == 'ubuntu-latest'
        shell: bash {0}
        env:
          GHIDRA_INSTALL_DIR: ${{ github.workspace }}/ghidra
        run: |
          set -uo pipefail
          mkdir -p smoke/min-hirom/proj smoke/min-hirom/scripts smoke/min-hirom/rom
          python3 tests/synth-min-hirom.py smoke/min-hirom/rom/min.smc
          cp tests/PrintSnesArtifacts.java smoke/min-hirom/scripts/
          echo "===== min-HiROM ====="
          ghidra/support/analyzeHeadless smoke/min-hirom/proj smoketest \
            -import smoke/min-hirom/rom/min.smc \
            -scriptPath smoke/min-hirom/scripts \
            -postScript PrintSnesArtifacts.java \
            -deleteProject \
            > smoke/min-hirom/headless.log 2>&1
          rc=$?
          echo "analyzeHeadless exit code: $rc"
          tail -n 80 smoke/min-hirom/headless.log
          grep -E 'MARK:' smoke/min-hirom/headless.log > smoke/min-hirom/marks.txt || true
          cat smoke/min-hirom/marks.txt
          if [ "$rc" -ne 0 ] && [ ! -s smoke/min-hirom/marks.txt ]; then
            echo "min-HiROM analyzeHeadless failed and produced no MARK output" >&2
            exit 1
          fi

      - name: Assert min-HiROM markers
        if: matrix.os == 'ubuntu-latest'
        shell: bash {0}
        run: |
          set -uo pipefail
          marks=smoke/min-hirom/marks.txt
          required=(
            'MARK: LANGUAGE 65816:LE:16:default'
            'MARK: MAPMODE @ 0000ffd5 = 21'
            'MARK: VECTOR vector_RESET @ 0000fffc'
            'MARK: ENTRY RESET 00008000'
            # HiROM lays the cart down at $C0:0000 with mirrors at $00:8000
            # and $80:8000. Names come from HiRomLoader.load.
            'MARK: BLOCK rom_C0_0000-C0_FFFF (HiROM bank C0)'
            'MARK: BLOCK rom_00_8000_mirror2'
            'MARK: BLOCK rom_80_8000_mirror1'
          )
          fail=0
          for pat in "${required[@]}"; do
            if grep -qF "$pat" "$marks"; then
              echo "OK   $pat"
            else
              echo "MISS $pat"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || { echo "min-HiROM smoke test failed" >&2; exit 1; }

      - name: Upload smoke-test artefacts on failure
        if: failure() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-${{ env.GHIDRA_VERSION }}-${{ matrix.os }}
          path: |
            smoke/**/headless.log
            smoke/**/marks.txt
            smoke/**/rom/*.smc
          if-no-files-found: ignore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-snes-loader-${{ env.GHIDRA_VERSION }}-${{ matrix.os }}
          path: ${{ steps.locate.outputs.zip }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release' && matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.zip }}
