name=ghidra_snes_loader
description=Loader for Super Nintendo / Super Famicom (SNES) ROMs. Auto-detects LoROM/HiROM/ExLoROM/ExHiROM (with or without SMC copier header) and the SA-1, SuperFX, S-DD1, Cx4 and SPC7110 cartridge add-ons; lays down WRAM, the LowRAM mirror, named PPU/CPU/DMA registers, MSU-1 streaming registers, optional coprocessor register windows, cartridge SRAM, and the native + emulation interrupt vector tables; bundles DBR/DP tracking and function-discovery analysers so direct-page, absolute, and direct-call structure is more useful in the decompiler. Requires processor language 65816:LE:16:default (see companion ghidra-65816 module).
author=achan1989, modernised for current Ghidra
createdOn=2026-04-25
version=1.3.0
